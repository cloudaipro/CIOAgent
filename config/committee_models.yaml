# Per-agent model service for the investment committee.
# service: "claude" = claude-agent-sdk (subscription, no key) | "nim" = NVIDIA NIM (needs NVIDIA_API_KEY)
#          "openai" = OpenAI API (needs OPENAI_API_KEY)
defaults: {service: claude, model: claude-opus-4-8}
agents:
  market: {service: openai, model: gpt-5.5-2026-04-23}
  macro: {service: openai, model: gpt-5.5-2026-04-23}
  equity: {service: openai, model: gpt-5.5-2026-04-23}
  industry: {service: openai, model: gpt-5.5-2026-04-23}
  valuation: {service: openai, model: gpt-5.5-2026-04-23}
  quant: {service: openai, model: gpt-5.5-2026-04-23}
  etf: {service: openai, model: gpt-5.5-2026-04-23}
  risk: {service: openai, model: gpt-5.5-2026-04-23}
  catalyst: {service: openai, model: gpt-5.5-2026-04-23}
  moderator: {service: openai, model: gpt-5.5-2026-04-23}
  cio:
    chain:
    - service: openai
      model: gpt-5.5-2026-04-23
      daily_limit: 200000
    - service: claude
      model: claude-opus-4-8
      daily_limit: 200000
    - service: nim
      model: moonshotai/kimi-k2.6
  # Watchlist Monitoring Agent: same chain shape as cio (premium → premium → cheap),
  # so the pre-market briefing degrades gracefully when a backend is down/over-budget.
  wma:
    chain:
    - service: openai
      model: gpt-5.5-2026-04-23
      daily_limit: 200000
    - service: claude
      model: claude-opus-4-8
      daily_limit: 200000
    - service: nim
      model: moonshotai/kimi-k2.6
  # TC translation: Claude is reliable on long markdown + strong Traditional Chinese.
  # Output is ALSO post-converted with OpenCC s2twp (translate.py) to GUARANTEE
  # Traditional (Taiwan) glyphs/phrasing regardless of which backend answers.
  translator: {service: openai, model: gpt-5.5-2026-04-23}
# nim.max_tokens = output cap value (env CIO_NIM_MAX_TOKENS overrides).
nim: {base_url: "https://integrate.api.nvidia.com/v1", api_key_env: NVIDIA_API_KEY, max_tokens: 20480}
# claude (claude-agent-sdk) has no plain output max_tokens; only a thinking-token
# budget. Set claude.max_thinking_tokens (env CIO_CLAUDE_MAX_THINKING_TOKENS) to cap it.
# claude: {max_thinking_tokens: 8000}
# token_param: gpt-5.x wants max_completion_tokens; older chat models want max_tokens.
# max_tokens here is the output-cap VALUE. Env CIO_OPENAI_TOKEN_PARAM / CIO_OPENAI_MAX_TOKENS override.
openai: {base_url: "https://api.openai.com/v1", api_key_env: OPENAI_API_KEY, token_param: max_completion_tokens, max_tokens: 20480}
# model_catalog: per-service model-name suggestions for the dashboard Configure tab.
# Maintained from the UI ("Manage model catalog"). Free text is always allowed; this
# only seeds the dropdowns. Services omitted here fall back to built-in defaults.
model_catalog:
  claude:
  - claude-opus-4-8
  - claude-opus-4-7
  - claude-opus-4-6
  - claude-sonnet-4-6
  - claude-sonnet-4-5
  - claude-haiku-4-5-20251001
  nim:
  - nvidia/nemotron-3-ultra-550b-a55b
  - minimaxai/minimax-m2.7
  - moonshotai/kimi-k2.6
  openai:
  - gpt-5.5-2026-04-23
